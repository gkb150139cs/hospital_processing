services:
  bulk-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      HOSPITAL_API_BASE_URL: https://hospital-directory.onrender.com
      MAX_CSV_ROWS: "20"
      MAX_CONCURRENT_REQUESTS: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
